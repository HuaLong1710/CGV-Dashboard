<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot CGV</title>
  <link rel="stylesheet" href="../css/chatbot.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo" onclick="location.href='index.html'">
        Dashboard
      </div>

      <div class="menu-item" onclick="location.href='dashboard.html'">
        📊 Power BI
      </div>

      <div class="menu-item active" onclick="location.href='chatbot.html'">
        💬 Chatbot
      </div>

      <button class="new-chat" onclick="newChat()">
        ✎ Cuộc trò chuyện mới
      </button>

      <div class="menu-item">
        🔍 Tìm kiếm trong các cuộc trò chuyện
      </div>

      <div class="section-title">
        Gần đây
      </div>
      <div class="recent-list" id="recentList"></div>
    </aside>

    <main class="main">
      <section class="chat-area">
        <h1 id="welcomeText">
          Xin chào, bạn hôm nay bạn cần gì ?
        </h1>

        <div class="messages-wrapper">
          <div class="messages" id="chatBox"></div>
        </div>

        <div class="input-box">
          <button class="plus">+</button>

          <textarea
            id="userInput"
            placeholder="Hỏi chatbot CGV"
            rows="1"
            oninput="autoResizeInput()"
            onkeydown="handleEnter(event)"
          ></textarea>

          <button class="send-btn" onclick="sendMessage()">
            ➤
          </button>
        </div>
      </section>
    </main>
  </div>

  <script src="../js/script.js"></script>
</body>
</html>

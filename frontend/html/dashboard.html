<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Power BI</title>
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo" onclick="location.href='index.html'">
          Dashboard
        </div>
        <button class="toggle-sidebar" onclick="toggleSidebar()">
          ☰
        </button>
      </div>

      <div class="menu-item active" data-title="Power BI" onclick="location.href='dashboard.html'">
        <span class="menu-icon">◫</span>
        <span class="menu-text">Power BI</span>
      </div>

      <div class="menu-item" data-title="Chatbot" onclick="location.href='chatbot.html'">
        <span class="menu-icon">🗲</span>
        <span class="menu-text">Chatbot</span>
      </div>
    </aside>

    <main class="main">
      <section class="dashboard-area" style="display: block;">
        <iframe
          class="powerbi-frame"
          src="https://app.powerbi.com/reportEmbed?reportId=eddda876-fe0b-40b4-b6cc-7d075dbb1ffd&autoAuth=true&ctid=e7572e92-7aee-4713-a3c4-ba64888ad45f"
          frameborder="0"
          allowFullScreen="true">
        </iframe>
      </section>
    </main>
  </div>

  <script src="../js/sidebar.js"></script>
</body>
</html>

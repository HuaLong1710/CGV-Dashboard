<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Power BI</title>
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo" onclick="location.href='index.html'">
          Dashboard
        </div>
        <button class="toggle-sidebar" onclick="toggleSidebar()">
          ☰
        </button>
      </div>

      <div class="theme-toggle" onclick="toggleTheme()">
        <div class="theme-circle">
          <span id="themeIcon">☾</span>
        </div>
      </div>

      <div class="menu-item active" data-title="Power BI" onclick="location.href='dashboard.html'">
        <span class="menu-icon">◫</span>
        <span class="menu-text">Power BI</span>
      </div>

      <div class="menu-item" id="chatbotMenuItem" data-title="Chatbot" oncontextmenu="openChatbotContextMenu(event)" onclick="location.href='chatbot.html'">
        <span class="menu-icon">🗲</span>
        <span class="menu-text">Chatbot</span>
      </div>
    </aside>

    <main class="main">
      <section class="dashboard-area" style="display: block;">
        <iframe
          class="powerbi-frame"
          src="https://app.powerbi.com/reportEmbed?reportId=b880c975-fe1c-4747-b632-f5f8ade80fdb&autoAuth=true&ctid=e7572e92-7aee-4713-a3c4-ba64888ad45f"
          frameborder="0"
          allowFullScreen="true">
        </iframe>
      </section>
    </main>
  </div>

  <div class="context-menu" id="chatbotContextMenu">
    <div onclick="openBubbleChat()">Mở bubble chat</div>
  </div>

  <div class="bubble-chat" id="bubbleChat">
    <div class="bubble-sidebar" id="bubbleSidebar">
      <button class="bubble-new-chat" onclick="newBubbleChat()">✎ Cuộc trò chuyện mới</button>
      <div class="bubble-sidebar-title">Gần đây</div>
      <div class="bubble-history-list" id="bubbleHistoryList"></div>
    </div>

    <div class="bubble-main">
      <div class="bubble-header" onpointerdown="startDragBubble(event)">
        <span id="bubbleTitle" onclick="toggleBubbleSidebar(event)">Chatbot CGV</span>
        <div class="bubble-controls">
          <button onclick="minimizeBubbleChat()">−</button>
          <button onclick="closeBubbleChat()">×</button>
        </div>
      </div>

      <div class="bubble-messages" id="bubbleMessages"></div>

      <div class="bubble-input">
        <input id="bubbleInput" type="text" placeholder="Hỏi chatbot..." onkeydown="handleBubbleEnter(event)" />
        <button onclick="sendBubbleMessage()">➤</button>
      </div>
    </div>

    <div class="resize-edge left" onpointerdown="startResizeBubble(event, 'left')"></div>
    <div class="resize-edge right" onpointerdown="startResizeBubble(event, 'right')"></div>
    <div class="resize-edge top" onpointerdown="startResizeBubble(event, 'top')"></div>
    <div class="resize-edge bottom" onpointerdown="startResizeBubble(event, 'bottom')"></div>
    <div class="resize-corner top-left" onpointerdown="startResizeBubble(event, 'top-left')"></div>
    <div class="resize-corner top-right" onpointerdown="startResizeBubble(event, 'top-right')"></div>
    <div class="resize-corner bottom-left" onpointerdown="startResizeBubble(event, 'bottom-left')"></div>
    <div class="resize-corner bottom-right" onpointerdown="startResizeBubble(event, 'bottom-right')"></div>
  </div>

    <div
    class="bubble-chat-icon"
    id="bubbleChatIcon"
    onclick="restoreBubbleChat()"
  >
    🗲
  </div>

  <script src="../js/sidebar.js"></script>
  <script src="../js/dashboard.js"></script>
  <script src="../js/theme.js"></script>
</body>
</html>
